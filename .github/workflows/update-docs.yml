name: update-docs

on:
  # Generate docs and create a PR to crossplane/docs on every merge to main
  push:
    branches:
      - main
  # Generate docs and create a PR to crossplane/docs on every release
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  # Generate docs for main branch
  update-master-docs:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Nix
        uses: cachix/install-nix-action@4e002c8ec80594ecd40e759629461e26c8abed15 # v31

      - name: Setup Cachix
        uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          name: crossplane
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build CLI
        run: nix build --print-build-logs

      - name: Checkout docs repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: crossplane/docs
          path: ./docs

      - name: Generate docs
        run: |
          chmod +x ./result/bin/crossplane
          ./result/bin/crossplane generate-docs -o ./docs/content/master/cli/command-reference.md

      - name: Create PR for master docs
        uses: peter-evans/create-pull-request@57e7f934ba889cdaf233e2e46d52a2cb5b561a53 # v7
        with:
          path: ./docs
          branch: docs/auto-update-master-cli
          commit-message: "docs(cli): auto-update master CLI reference"
          title: "docs(cli): auto-update master CLI command reference"
          body: |
            Auto-generated by the update-docs workflow.
            This PR updates the master CLI command reference documentation.
          base: main

  # Generate docs for release version
  update-release-docs:
    if: github.event_name == 'release'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.release.target_commitish }}

      - name: Install Nix
        uses: cachix/install-nix-action@4e002c8ec80594ecd40e759629461e26c8abed15 # v31

      - name: Setup Cachix
        uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          name: crossplane
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build CLI
        run: nix build --print-build-logs

      - name: Checkout docs repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: crossplane/docs
          path: ./docs

      - name: Get release version
        id: version
        run: |
          VERSION=${{ github.event.release.tag_name }}
          # Strip leading 'v' for directory name
          DIR_VERSION=$(echo "$VERSION" | sed 's/^v//')
          echo "dir=$DIR_VERSION" >> $GITHUB_OUTPUT

      - name: Generate docs
        run: |
          chmod +x ./result/bin/crossplane
          ./result/bin/crossplane generate-docs -o ./docs/content/${{ steps.version.outputs.dir }}/cli/command-reference.md

      - name: Create PR for release docs
        uses: peter-evans/create-pull-request@57e7f934ba889cdaf233e2e46d52a2cb5b561a53 # v7
        with:
          path: ./docs
          branch: docs/auto-update-${{ steps.version.outputs.dir }}-cli
          commit-message: "docs(cli): auto-update ${{ steps.version.outputs.dir }} CLI reference"
          title: "docs(cli): auto-update ${{ steps.version.outputs.dir }} CLI command reference"
          body: |
            Auto-generated by the update-docs workflow.
            This PR updates the ${{ steps.version.outputs.dir }} CLI command reference documentation.
          base: main
